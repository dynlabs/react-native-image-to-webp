appId: dynlabs.reactnativeimagetowebp.example
---
# Basic Image Conversion Test - iOS
# Tests: Select image, convert with default preset, verify size difference

- launchApp
- assertVisible: "Image to WebP Converter"
- assertVisible: "Select Image"

# Grant photo library permission if needed
- runFlow:
    when:
      visible: ".*Allow Access|Allow.*Photos|Permission"
    commands:
      - tapOn: "Allow|Allow Access to All Photos|Select Photos"

# Select image from library
- tapOn: "Select Image"
- runFlow:
    when:
      visible: ".*Photo Library|Photos|Choose from library"
    commands:
      - tapOn: ".*Photo Library|Photos|Choose from library"
      - runFlow:
          when:
            visible: ".*Allow Access|Allow.*Photos|Permission"
          commands:
            - tapOn: "Allow|Allow Access to All Photos|Select Photos"
      - tapOn:
          index: 0
          optional: true
      - tapOn:
          text: ".*Select|Choose|Done"
          optional: true

# Wait for image to be selected
- waitForAnimationToEnd
- assertVisible: "Change Image"

# Verify original image size is displayed
- assertVisible:
    text: "Original Size:"
    optional: true

# Convert with default preset (balanced)
- scroll
- assertVisible: "Convert"
- tapOn: "Convert.*balanced|Convert"

# Wait for conversion to complete
- waitForAnimationToEnd:
    timeout: 15000

# Verify success alert
- assertVisible: "Success"
- tapOn: "OK"

# Verify results section shows conversion details
- scroll
- assertVisible: "Results"
- assertVisible: "balanced"

# Verify size information is shown
- assertVisible:
    text: "WebP Size:"
- assertVisible:
    text: "Saved:|Increased:"
    optional: true

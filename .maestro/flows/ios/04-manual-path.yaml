appId: dynlabs.reactnativeimagetowebp.example
---
# Test Manual Path Input - iOS
# Tests: Enter image path manually, convert, verify size difference

- assertVisible: "Image to WebP Converter"

# Scroll to manual path input
- scroll
- assertVisible:
    text: "Manual Path"
    optional: true

# Enter image path (iOS uses file:// URIs)
- tapOn:
    text: ".*"
    optional: true
- scroll
- inputText: "file:///path/to/test-image.jpg"
- hideKeyboard

# Wait for image to load
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    text: "Original Size:"
    optional: true

# Scroll to convert section
- scroll
- assertVisible: "Convert"
- tapOn: "Convert.*balanced|Convert"
- waitForAnimationToEnd:
    timeout: 15000

# Verify conversion succeeded
- assertVisible: "Success"
- tapOn: "OK"

# Verify results section
- scroll
- assertVisible: "Results"
- assertVisible: "balanced"

# Verify WebP size is shown
- assertVisible: "WebP Size:"
- assertVisible:
    text: "Saved:|Increased:"
    optional: true

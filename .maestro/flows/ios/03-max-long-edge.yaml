appId: dynlabs.reactnativeimagetowebp.example
---
# Test Max Long Edge - iOS
# Tests: Convert image with maxLongEdge option and verify dimensions

- launchApp
- assertVisible: "Image to WebP Converter"

# Grant photo library permission if needed
- runFlow:
    when:
      visible: ".*Allow Access|Allow.*Photos|Permission"
    commands:
      - tapOn: "Allow|Allow Access to All Photos|Select Photos"

# Select image from library
- tapOn: "Select Image"
- runFlow:
    when:
      visible: ".*Photo Library|Photos|Choose from library"
    commands:
      - tapOn: ".*Photo Library|Photos|Choose from library"
      - runFlow:
          when:
            visible: ".*Allow Access|Allow.*Photos|Permission"
          commands:
            - tapOn: "Allow|Allow Access to All Photos|Select Photos"
      - tapOn:
          index: 0
          optional: true
      - tapOn:
          text: ".*Select|Choose|Done"
          optional: true

- waitForAnimationToEnd
- assertVisible: "Change Image"

# Scroll to options section
- scroll
- assertVisible: "Max Long Edge"

# Enter max long edge value (e.g., 1024)
- tapOn:
    text: ".*"
    optional: true
- scroll
- inputText: "1024"
- hideKeyboard

# Convert with max long edge
- scroll
- assertVisible: "Convert"
- tapOn: "Convert.*balanced|Convert"

# Wait for conversion to complete
- waitForAnimationToEnd:
    timeout: 15000

# Verify success
- assertVisible: "Success"
- tapOn: "OK"

# Verify results section
- scroll
- assertVisible: "Results"
- assertVisible: "balanced"

# Verify dimensions are shown
- assertVisible:
    text: "Dimensions:.*×.*"
- assertVisible: "WebP Size:"

# Verify size difference is shown
- assertVisible:
    text: "Saved:|Increased:"
    optional: true

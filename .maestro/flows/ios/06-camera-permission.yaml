appId: dynlabs.reactnativeimagetowebp.example
---
# Test Camera Permission - iOS
# Tests: Camera permission handling

- launchApp
- assertVisible: "Image to WebP Converter"

# Test camera option
- tapOn: "Select Image"
- runFlow:
    when:
      visible: ".*Take Photo|Camera"
    commands:
      - tapOn: ".*Take Photo|Camera"
      - runFlow:
          when:
            visible: ".*Allow|Permission|Grant"
          commands:
            - tapOn: "Allow|OK|Grant"
      - tapOn:
          text: ".*Cancel|Back"
          optional: true

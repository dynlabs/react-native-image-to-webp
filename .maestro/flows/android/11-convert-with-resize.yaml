appId: dynlabs.reactnativeimagetowebp.example
---
# Test Image Conversion with Resize - Android
# Tests: Convert image with maxLongEdge, verify dimensions and size difference

- assertVisible: "Image to WebP Converter"

# Scroll to manual path input
- scroll
- assertVisible:
    text: "Manual Path"
    optional: true

# Enter image path
- tapOn:
    text: ".*"
    optional: true
- scroll
- inputText: "/sdcard/Download/test-images/test-4k.jpg"
- hideKeyboard

# Wait for image to load
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    text: "Original Size:"
    optional: true

# Set max long edge to 2048
- scroll
- assertVisible: "Max Long Edge"
- tapOn:
    text: ".*"
    optional: true
- scroll
- inputText: "2048"
- hideKeyboard

# Convert
- scroll
- assertVisible: "Convert (balanced)"
- tapOn: "Convert (balanced)"
- waitForAnimationToEnd:
    timeout: 20000

# Verify success
- assertVisible: "Success"
- tapOn: "OK"

# Verify results
- scroll
- assertVisible: "Results"
- assertVisible: "balanced"

# Verify dimensions are shown (should be <= 2048)
- assertVisible:
    text: "Dimensions:.*×.*"

# Verify size difference
- assertVisible: "WebP Size:"
- assertVisible:
    text: "Saved:|Increased:"
    optional: true

appId: dynlabs.reactnativeimagetowebp.example
---
# Test Image Conversion - 4K Image
# Tests: Convert 4K test image, verify size difference

- assertVisible: "Image to WebP Converter"

# Scroll to manual path input section
- scroll
- assertVisible:
    text: "Manual Path"
    optional: true

# Enter the path to 4K test image
- tapOn:
    text: ".*"
    optional: true
- scroll
- inputText: "/sdcard/Download/test-images/test-4k.jpg"
- hideKeyboard

# Wait for image to load
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    text: "Original Size:"
    optional: true

# Scroll to convert section
- scroll
- assertVisible: "Convert (balanced)"
- tapOn: "Convert (balanced)"

# Wait for conversion to complete
- waitForAnimationToEnd:
    timeout: 20000

# Verify success
- assertVisible: "Success"
- tapOn: "OK"

# Verify results section
- scroll
- assertVisible: "Results"
- assertVisible: "balanced"

# Verify size difference
- assertVisible: "WebP Size:"
- assertVisible:
    text: "Saved:|Increased:"
    optional: true

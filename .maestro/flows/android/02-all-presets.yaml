appId: dynlabs.reactnativeimagetowebp.example
---
# Test All Presets - Android
# Tests: Convert image with all available presets and verify size differences

- launchApp
- assertVisible: "Image to WebP Converter"

# Grant permissions if needed
- runFlow:
    when:
      visible: "Allow.*access|Permission|Allow"
    commands:
      - tapOn: "Allow|OK|Grant"

# Select image from library
- tapOn: "Select Image"
- runFlow:
    when:
      visible: ".*Photo Library|Gallery|Images|Choose from library"
    commands:
      - tapOn: ".*Photo Library|Gallery|Images|Choose from library"
      - runFlow:
          when:
            visible: "Allow.*access|Permission|Allow"
          commands:
            - tapOn: "Allow|OK|Grant"
      - tapOn:
          index: 0
          optional: true
      - tapOn:
          text: ".*Select|Choose|OK|Done"
          optional: true

- waitForAnimationToEnd
- assertVisible: "Change Image"

# Scroll to presets section
- scroll

# Test each preset
- tapOn: "balanced"
- assertVisible: "balanced"
- tapOn: "Convert.*balanced|Convert"
- waitForAnimationToEnd:
    timeout: 10000
- assertVisible: "Success"
- tapOn: "OK"
- scroll
- assertVisible: "Results"
- assertVisible: "WebP Size:"

- scroll
- tapOn: "small"
- assertVisible: "small"
- tapOn: "Convert.*small|Convert"
- waitForAnimationToEnd:
    timeout: 10000
- assertVisible: "Success"
- tapOn: "OK"
- scroll
- assertVisible: "Results"
- assertVisible: "WebP Size:"

- scroll
- tapOn: "fast"
- assertVisible: "fast"
- tapOn: "Convert.*fast|Convert"
- waitForAnimationToEnd:
    timeout: 10000
- assertVisible: "Success"
- tapOn: "OK"
- scroll
- assertVisible: "Results"
- assertVisible: "WebP Size:"

- scroll
- tapOn: "lossless"
- assertVisible: "lossless"
- tapOn: "Convert.*lossless|Convert"
- waitForAnimationToEnd:
    timeout: 10000
- assertVisible: "Success"
- tapOn: "OK"
- scroll
- assertVisible: "Results"
- assertVisible: "WebP Size:"

- scroll
- tapOn: "document"
- assertVisible: "document"
- tapOn: "Convert.*document|Convert"
- waitForAnimationToEnd:
    timeout: 10000
- assertVisible: "Success"
- tapOn: "OK"
- scroll
- assertVisible: "Results"
- assertVisible: "WebP Size:"

appId: dynlabs.reactnativeimagetowebp.example
---
# Test Image Conversion - All Resolutions
# Tests: Convert 1080p, 2K, and 4K images with different presets, verify size differences

- assertVisible: "Image to WebP Converter"

# Test 1: Convert 1080p with 'small' preset
- scroll
- assertVisible:
    text: "Manual Path"
    optional: true
- tapOn:
    text: ".*"
    optional: true
- scroll
- inputText: "/sdcard/Download/test-images/test-1080p.jpg"
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 3000
- scroll
- tapOn: "small"
- assertVisible: "small"
- tapOn: "Convert.*small|Convert"
- waitForAnimationToEnd:
    timeout: 15000
- assertVisible: "Success"
- tapOn: "OK"
- scroll
- assertVisible: "Results"
- assertVisible: "WebP Size:"
- assertVisible:
    text: "Saved:|Increased:"
    optional: true


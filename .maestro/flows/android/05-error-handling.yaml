appId: dynlabs.reactnativeimagetowebp.example
---
# Test Error Handling - Android
# Tests: Error handling for invalid inputs

- launchApp
- assertVisible: "Image to WebP Converter"

# Test error handling - try to convert without selecting image
- scroll
- assertVisible: "Convert (balanced)"
- tapOn: "Convert (balanced)"
- waitForAnimationToEnd:
    timeout: 3000

# Should show error alert
- assertVisible: "Error|Please select an image"
- tapOn: "OK"

# Test with invalid path
- scroll
- assertVisible:
    text: "Manual Path"
    optional: true
- tapOn:
    text: ".*"
    optional: true
- scroll
- inputText: "/invalid/path/image.jpg"
- hideKeyboard

- scroll
- tapOn: "Convert (balanced)"
- waitForAnimationToEnd:
    timeout: 10000

# Should show error
- assertVisible: "Error|Conversion Failed|File not found"
- tapOn: "OK"

appId: dynlabs.reactnativeimagetowebp.example
---
# Test Max Long Edge - Android
# Tests: Convert image with maxLongEdge option and verify dimensions

- launchApp
- assertVisible: "Image to WebP Converter"

# Grant permissions if needed
- runFlow:
    when:
      visible: "Allow.*access|Permission|Allow"
    commands:
      - tapOn: "Allow|OK|Grant"

# Select image from library
- tapOn: "Select Image"
- runFlow:
    when:
      visible: ".*Photo Library|Gallery|Images|Choose from library"
    commands:
      - tapOn: ".*Photo Library|Gallery|Images|Choose from library"
      - runFlow:
          when:
            visible: "Allow.*access|Permission|Allow"
          commands:
            - tapOn: "Allow|OK|Grant"
      - tapOn:
          index: 0
          optional: true
      - tapOn:
          text: ".*Select|Choose|OK|Done"
          optional: true

- waitForAnimationToEnd
- assertVisible: "Change Image"

# Scroll to options section
- scroll
- assertVisible: "Max Long Edge"

# Enter max long edge value (e.g., 1024)
- tapOn:
    text: ".*"
    optional: true
- scroll
- inputText: "1024"
- hideKeyboard

# Convert with max long edge
- scroll
- assertVisible: "Convert (balanced)"
- tapOn: "Convert (balanced)"

# Wait for conversion to complete
- waitForAnimationToEnd:
    timeout: 15000

# Verify success
- assertVisible: "Success"
- tapOn: "OK"

# Verify results section
- scroll
- assertVisible: "Results"
- assertVisible: "balanced"

# Verify dimensions are shown and max dimension is <= 1024
- assertVisible:
    text: "Dimensions:.*×.*"
- assertVisible: "WebP Size:"

# Verify size difference is shown
- assertVisible:
    text: "Saved:|Increased:"
    optional: true

appId: dynlabs.reactnativeimagetowebp.example
---
# Simple Test - Android
# Tests: Basic UI elements and error handling

- launchApp
- assertVisible: "Image to WebP Converter"
- assertVisible: "Select Image"

# Test error handling - try to convert without selecting image
- scroll
- assertVisible: "Convert (balanced)"
- tapOn: "Convert (balanced)"
- waitForAnimationToEnd:
    timeout: 3000

# Should show error alert
- assertVisible: "Error|Please select an image"
- tapOn: "OK"

# Verify presets are visible
- scroll
- assertVisible: "balanced"
- assertVisible: "small"
- assertVisible: "fast"
- assertVisible: "lossless"
- assertVisible: "document"

# Verify options section
- scroll
- assertVisible: "Max Long Edge"

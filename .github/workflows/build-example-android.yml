name: Build Example Android

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: true
        type: choice
        options:
          - debug
          - release
        default: debug

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Build Android Example
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install JDK
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Finalize Android SDK
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"

      - name: Cache Gradle
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x example/android/gradlew

      - name: Build Android APK/AAB
        working-directory: example/android
        run: |
          if [ "${{ inputs.build_type }}" == "release" ]; then
            ./gradlew bundleRelease --no-daemon --console=plain
            BUILD_OUTPUT="app/build/outputs/bundle/release/app-release.aab"
          else
            ./gradlew assembleDebug --no-daemon --console=plain
            BUILD_OUTPUT="app/build/outputs/apk/debug/app-debug.apk"
          fi
          echo "BUILD_OUTPUT=$BUILD_OUTPUT" >> $GITHUB_ENV
          echo "Built: $BUILD_OUTPUT"

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-example-${{ inputs.build_type }}-${{ github.sha }}
          path: |
            example/android/app/build/outputs/apk/**/*.apk
            example/android/app/build/outputs/bundle/**/*.aab
          retention-days: 30
          if-no-files-found: error

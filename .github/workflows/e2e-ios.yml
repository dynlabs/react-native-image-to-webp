name: E2E Tests iOS

on:
  push:
    branches: [main, develop]
    paths:
      - 'example/**'
      - 'src/**'
      - '.maestro/**'
      - '.github/workflows/e2e-ios.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'example/**'
      - 'src/**'
      - '.maestro/**'
      - '.github/workflows/e2e-ios.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-ios:
    name: E2E Tests iOS
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      # Parallel setup steps that don't depend on each other
      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: pip install Pillow

      - name: Cache Maestro
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.maestro
          key: ${{ runner.os }}-maestro-latest
          restore-keys: |
            ${{ runner.os }}-maestro-

      - name: Setup Maestro
        run: |
          if [ ! -f "$HOME/.maestro/bin/maestro" ]; then
            curl -Ls "https://get.maestro.mobile.dev" | bash
          fi
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # Generate test images before simulator starts (parallel with other setup)
      - name: Generate Test Images
        run: python scripts/generate-test-images.py

      # Install CocoaPods dependencies
      - name: Install CocoaPods dependencies
        working-directory: example/ios
        run: |
          bundle install
          # Update CocoaPods repo to ensure latest specs are available
          bundle exec pod repo update || true
          bundle exec pod install --project-directory=.

      # Get package version for cache key
      - name: Get Package Version
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      # Cache the iOS build using package version as key
      - name: Cache iOS Build
        id: cache-build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: example/ios/build
          key: ios-build-${{ steps.package-version.outputs.version }}-${{ hashFiles('example/ios/Podfile.lock', 'example/ios/ReactNativeImageToWebpExample.xcodeproj/project.pbxproj', 'package.json') }}
          restore-keys: |
            ios-build-${{ steps.package-version.outputs.version }}-
            ios-build-

      # Build iOS app before simulator starts (only if cache miss)
      - name: Build iOS App
        if: steps.cache-build.outputs.cache-hit != 'true'
        working-directory: example/ios
        run: |
          # List available simulators to determine SDK
          echo "Available simulators:"
          xcrun simctl list devices available | head -20
          
          # Use a generic simulator destination for building (doesn't require specific simulator)
          # This builds for iOS Simulator platform without needing a specific device
          xcodebuild clean build \
            -workspace ReactNativeImageToWebpExample.xcworkspace \
            -scheme ReactNativeImageToWebpExample \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO || exit 1
          
          # Verify build output exists
          if [ ! -d "build/Build/Products/Debug-iphonesimulator/ReactNativeImageToWebpExample.app" ]; then
            echo "Error: Build output not found at expected location"
            find build -name "*.app" -type d || true
            exit 1
          fi
          echo "Build successful: build/Build/Products/Debug-iphonesimulator/ReactNativeImageToWebpExample.app"

      # Start simulator and run all simulator-dependent steps in one block
      - name: Create iOS Simulator and Run Tests
        run: |
          # List available runtimes and device types for debugging
          echo "=== Available iOS Runtimes ==="
          xcrun simctl list runtimes available
          
          echo ""
          echo "=== Available Device Types ==="
          xcrun simctl list devicetypes | grep iPhone
          
          # Get the latest available iOS runtime identifier
          # Output format can be: iOS 18.2 (18.2 - 22C91) (com.apple.CoreSimulator.SimRuntime.iOS-18-2)
          # or: iOS 26.2 - 23C54 - com.apple.CoreSimulator.SimRuntime.iOS-26-2
          RUNTIME_LINE=$(xcrun simctl list runtimes available | grep "iOS" | tail -1)
          echo "Latest runtime line: $RUNTIME_LINE"
          
          # Try multiple methods to extract runtime ID
          # Method 1: Extract from parentheses (com.apple.CoreSimulator.SimRuntime.iOS-X-Y)
          RUNTIME_ID=$(echo "$RUNTIME_LINE" | sed -n 's/.*(\(com\.apple\.CoreSimulator\.SimRuntime\.iOS-[0-9-]*\)).*/\1/p')
          
          # Method 2: Extract runtime ID directly if it's in the format "iOS X.Y - BUILD - com.apple..."
          if [ -z "$RUNTIME_ID" ]; then
            RUNTIME_ID=$(echo "$RUNTIME_LINE" | grep -o 'com\.apple\.CoreSimulator\.SimRuntime\.iOS-[0-9-]*' | head -1)
          fi
          
          # Method 3: Extract from any parentheses or after dashes
          if [ -z "$RUNTIME_ID" ]; then
            RUNTIME_ID=$(echo "$RUNTIME_LINE" | awk -F'[()]' '{for(i=1;i<=NF;i++) if($i ~ /com\.apple\.CoreSimulator\.SimRuntime\.iOS/) print $i}' | head -1)
          fi
          
          # Method 4: Try extracting from space-separated format
          if [ -z "$RUNTIME_ID" ]; then
            RUNTIME_ID=$(echo "$RUNTIME_LINE" | awk '{for(i=1;i<=NF;i++) if($i ~ /^com\.apple\.CoreSimulator\.SimRuntime\.iOS/) print $i}' | head -1)
          fi
          
          if [ -z "$RUNTIME_ID" ]; then
            echo "Error: Could not determine iOS runtime from line: $RUNTIME_LINE"
            echo "Full runtime list:"
            xcrun simctl list runtimes available
            exit 1
          fi
          
          echo "Using iOS runtime: $RUNTIME_ID"
          
          # Determine device type (prefer iPhone 15, fallback to available devices)
          DEVICE_TYPE="iPhone 15"
          if ! xcrun simctl list devicetypes | grep -q "iPhone 15"; then
            echo "iPhone 15 not found, trying iPhone 15 Pro..."
            if xcrun simctl list devicetypes | grep -q "iPhone 15 Pro"; then
              DEVICE_TYPE="iPhone 15 Pro"
            elif xcrun simctl list devicetypes | grep -q "iPhone 14"; then
              DEVICE_TYPE="iPhone 14"
            elif xcrun simctl list devicetypes | grep -q "iPhone 13"; then
              DEVICE_TYPE="iPhone 13"
            else
              echo "Error: Could not find suitable iPhone device type"
              xcrun simctl list devicetypes | grep iPhone
              exit 1
            fi
          fi
          
          echo "Using device type: $DEVICE_TYPE"
          
          # Check if simulator already exists
          SIMULATOR_NAME="iPhone 15 E2E"
          EXISTING_SIM=$(xcrun simctl list devices available | grep "$SIMULATOR_NAME" | grep -o '[0-9A-F]\{8\}-[0-9A-F]\{4\}-[0-9A-F]\{4\}-[0-9A-F]\{4\}-[0-9A-F]\{12\}' | head -1)
          
          if [ -n "$EXISTING_SIM" ]; then
            echo "Found existing simulator: $EXISTING_SIM"
            # Delete existing simulator to ensure clean state
            xcrun simctl delete "$EXISTING_SIM" || true
          fi
          
          # Create simulator with the determined runtime and device type
          echo "Creating simulator: $SIMULATOR_NAME with device type: $DEVICE_TYPE, runtime: $RUNTIME_ID"
          SIMULATOR_UDID=$(xcrun simctl create "$SIMULATOR_NAME" "$DEVICE_TYPE" "$RUNTIME_ID")
          
          if [ -z "$SIMULATOR_UDID" ]; then
            echo "Error: Failed to create simulator"
            exit 1
          fi
          
          echo "Created simulator: $SIMULATOR_UDID"
          
          # Boot the simulator
          echo "Booting simulator..."
          xcrun simctl boot "$SIMULATOR_UDID" || echo "Simulator may already be booted"
          
          # Wait for simulator to be ready
          echo "Waiting for simulator to be ready..."
          for i in {1..60}; do
            if xcrun simctl list devices booted | grep -q "$SIMULATOR_UDID"; then
              echo "Simulator is booted"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Error: Simulator failed to boot within timeout"
              xcrun simctl list devices
              exit 1
            fi
            echo "Waiting... ($i/60)"
            sleep 2
          done
          
          # Additional wait for simulator to be fully ready
          sleep 5
          
          # Verify build exists (should be cached or built in previous step)
          BUILD_PATH="example/ios/build/Build/Products/Debug-iphonesimulator/ReactNativeImageToWebpExample.app"
          if [ ! -d "$BUILD_PATH" ]; then
            echo "Build not found at $BUILD_PATH, building as fallback..."
            cd example/ios
            xcodebuild clean build \
              -workspace ReactNativeImageToWebpExample.xcworkspace \
              -scheme ReactNativeImageToWebpExample \
              -configuration Debug \
              -sdk iphonesimulator \
              -destination "id=$SIMULATOR_UDID" \
              -derivedDataPath ./build \
              CODE_SIGNING_ALLOWED=NO || exit 1
            cd ../..
            
            # Verify build was created
            if [ ! -d "$BUILD_PATH" ]; then
              echo "Error: Build still not found after fallback build"
              find example/ios/build -name "*.app" -type d || true
              exit 1
            fi
          fi
          
          # Install app on simulator
          echo "Installing app on simulator..."
          xcrun simctl install "$SIMULATOR_UDID" "$BUILD_PATH" || exit 1
          
          # Grant permissions
          echo "Granting permissions..."
          xcrun simctl privacy "$SIMULATOR_UDID" grant photos dynlabs.reactnativeimagetowebp.example || true
          xcrun simctl privacy "$SIMULATOR_UDID" grant camera dynlabs.reactnativeimagetowebp.example || true
          
          # Add test images to simulator photo library
          echo "Adding test images to simulator..."
          if [ -f "test-images/test-1080p.jpg" ]; then
            xcrun simctl addmedia "$SIMULATOR_UDID" test-images/test-1080p.jpg || echo "Failed to add test-1080p.jpg"
          fi
          if [ -f "test-images/test-2k.jpg" ]; then
            xcrun simctl addmedia "$SIMULATOR_UDID" test-images/test-2k.jpg || echo "Failed to add test-2k.jpg"
          fi
          if [ -f "test-images/test-4k.jpg" ]; then
            xcrun simctl addmedia "$SIMULATOR_UDID" test-images/test-4k.jpg || echo "Failed to add test-4k.jpg"
          fi
          
          # Launch the app
          echo "Launching app..."
          xcrun simctl launch "$SIMULATOR_UDID" dynlabs.reactnativeimagetowebp.example || true
          sleep 5
          
          # Run Maestro tests
          echo "Running Maestro tests..."
          maestro test .maestro/flows/ios/ || maestro test .maestro/flows/ios/ --continue-on-failure || exit 1
          
          # Cleanup: shutdown simulator
          echo "Shutting down simulator..."
          xcrun simctl shutdown "$SIMULATOR_UDID" || true

      - name: Upload Maestro Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-reports-ios-${{ github.sha }}
          path: |
            .maestro/**/*.png
            maestro-report.html
          retention-days: 7
          if-no-files-found: ignore
          compression-level: 6

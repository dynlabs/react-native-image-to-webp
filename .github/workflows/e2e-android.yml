name: E2E Tests Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-android:
    name: E2E Tests Android
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install JDK
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          target: default
          arch: x86_64

      - name: Finalize Android SDK
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"

      - name: Cache Gradle
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Maestro
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.maestro
          key: ${{ runner.os }}-maestro-latest
          restore-keys: |
            ${{ runner.os }}-maestro-

      - name: Create Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: Nexus 6
          script: |
            echo "Emulator created and started"

      - name: Make gradlew executable
        run: chmod +x example/android/gradlew

      - name: Build Android Debug APK
        working-directory: example/android
        run: |
          ./gradlew assembleDebug --no-daemon --console=plain

      - name: Install APK on Emulator
        run: |
          adb wait-for-device
          adb install -r example/android/app/build/outputs/apk/debug/app-debug.apk || true
          adb shell pm grant dynlabs.reactnativeimagetowebp.example android.permission.READ_EXTERNAL_STORAGE || true
          adb shell pm grant dynlabs.reactnativeimagetowebp.example android.permission.READ_MEDIA_IMAGES || true
          adb shell pm grant dynlabs.reactnativeimagetowebp.example android.permission.CAMERA || true

      - name: Setup Maestro
        run: |
          if [ ! -f "$HOME/.maestro/bin/maestro" ]; then
            curl -Ls "https://get.maestro.mobile.dev" | bash
          fi
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Wait for Emulator to be Ready
        run: |
          adb wait-for-device
          adb shell "while [[ -z $(getprop sys.boot_completed | tr -d '\r') ]]; do sleep 1; done"
          sleep 10

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: |
          pip install Pillow

      - name: Generate Test Images
        run: |
          python scripts/generate-test-images.py

      - name: Push Test Images to Emulator
        run: |
          adb wait-for-device
          adb shell mkdir -p /sdcard/Download/test-images
          adb push test-images/test-1080p.jpg /sdcard/Download/test-images/test-1080p.jpg || true
          adb push test-images/test-2k.jpg /sdcard/Download/test-images/test-2k.jpg || true
          adb push test-images/test-4k.jpg /sdcard/Download/test-images/test-4k.jpg || true
          adb shell ls -lh /sdcard/Download/test-images/

      - name: Run Maestro Tests
        run: |
          maestro test .maestro/flows/android/ || maestro test .maestro/flows/android/ --continue-on-failure

      - name: Pull All Test Images
        if: always()
        run: |
          mkdir -p artifacts/test-images
          # Pull input images
          adb pull /sdcard/Download/test-images/test-1080p.jpg artifacts/test-images/ || echo "Failed to pull test-1080p.jpg"
          adb pull /sdcard/Download/test-images/test-2k.jpg artifacts/test-images/ || echo "Failed to pull test-2k.jpg"
          adb pull /sdcard/Download/test-images/test-4k.jpg artifacts/test-images/ || echo "Failed to pull test-4k.jpg"
          # Pull output WebP images
          adb pull /sdcard/Download/test-images/test-1080p.webp artifacts/test-images/ || echo "Failed to pull test-1080p.webp (may not exist if test didn't run)"
          adb pull /sdcard/Download/test-images/test-2k.webp artifacts/test-images/ || echo "Failed to pull test-2k.webp (may not exist if test didn't run)"
          adb pull /sdcard/Download/test-images/test-4k.webp artifacts/test-images/ || echo "Failed to pull test-4k.webp (may not exist if test didn't run)"
          ls -lh artifacts/test-images/ || echo "No artifacts directory"

      - name: Upload Test Images Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-images-${{ github.sha }}
          path: artifacts/test-images/*
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Maestro Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-reports-android-${{ github.sha }}
          path: |
            .maestro/**/*.png
            maestro-report.html
          retention-days: 7
          if-no-files-found: ignore

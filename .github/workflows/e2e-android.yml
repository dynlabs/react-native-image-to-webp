name: E2E Tests Android

on:
  push:
    branches: [main, develop]
    paths:
      - 'example/**'
      - 'src/**'
      - '.maestro/**'
      - '.github/workflows/e2e-android.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'example/**'
      - 'src/**'
      - '.maestro/**'
      - '.github/workflows/e2e-android.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-android:
    name: E2E Tests Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      # Enable KVM for hardware acceleration (required for x86_64 emulators on Linux)
      # This must be done BEFORE the emulator runner action
      - name: Enable KVM group perms
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Parallel setup steps that don't depend on each other
      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup

      - name: Setup JDK
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
          cache-dependency-path: example/android/gradle/wrapper/gradle-wrapper.properties

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: pip install Pillow

      - name: Cache Maestro
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.maestro
          key: ${{ runner.os }}-maestro-latest
          restore-keys: |
            ${{ runner.os }}-maestro-

      - name: Setup Maestro
        run: |
          if [ ! -f "$HOME/.maestro/bin/maestro" ]; then
            curl -Ls "https://get.maestro.mobile.dev" | bash
          fi
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # Generate test images before emulator starts (parallel with other setup)
      - name: Generate Test Images
        run: python scripts/generate-test-images.py

      # Make gradlew executable before building
      - name: Prepare Gradle Wrapper
        run: chmod +x example/android/gradlew

      # Get package version for cache key
      - name: Get Package Version
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      # Cache the Release APK using package version as key
      - name: Cache Release APK
        id: cache-apk
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: example/android/app/build/outputs/apk/release/app-release.apk
          key: android-release-apk-${{ steps.package-version.outputs.version }}-${{ hashFiles('example/android/app/build.gradle', 'example/android/build.gradle', 'package.json') }}
          restore-keys: |
            android-release-apk-${{ steps.package-version.outputs.version }}-
            android-release-apk-

      # Build Release APK before emulator starts (only if cache miss)
      - name: Build Release APK
        if: steps.cache-apk.outputs.cache-hit != 'true'
        working-directory: example/android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --console=plain \
            --build-cache \
            --parallel \
            --max-workers=4 \
            -PreactNativeArchitectures=x86_64 || exit 1

      # Start emulator and run all emulator-dependent steps in one block
      - name: Create Android Emulator and Run Tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 30
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          profile: Nexus 6
          emulator-boot-timeout: 300
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot-load -noaudio -no-boot-anim -skip-adb-auth -wipe-data -no-metrics
          disable-animations: true
          disable-linux-hw-accel: false
          working-directory: example/android
          script: |
            # Verify APK exists (should be cached or built in previous step)
            if [ ! -f "app/build/outputs/apk/release/app-release.apk" ]; then
              echo "APK not found, building as fallback..."
              ./gradlew assembleRelease \
                --no-daemon \
                --console=plain \
                --build-cache \
                --parallel \
                --max-workers=4 \
                -PreactNativeArchitectures=x86_64 || exit 1
            fi
            
            # Install APK and grant permissions
            adb wait-for-device
            adb install -r app/build/outputs/apk/release/app-release.apk || exit 1
            adb shell pm grant dynlabs.reactnativeimagetowebp.example android.permission.READ_EXTERNAL_STORAGE || true
            adb shell pm grant dynlabs.reactnativeimagetowebp.example android.permission.READ_MEDIA_IMAGES || true
            adb shell pm grant dynlabs.reactnativeimagetowebp.example android.permission.CAMERA || true
            
            # Push test images
            adb shell mkdir -p /sdcard/Download/test-images
            adb push ../../test-images/test-1080p.jpg /sdcard/Download/test-images/test-1080p.jpg || exit 1
            adb push ../../test-images/test-2k.jpg /sdcard/Download/test-images/test-2k.jpg || exit 1
            adb push ../../test-images/test-4k.jpg /sdcard/Download/test-images/test-4k.jpg || exit 1
            
            # Run Maestro tests (from repo root)
            cd ../.. && maestro test .maestro/flows/android/ || maestro test .maestro/flows/android/ --continue-on-failure || exit 1
            
            # Pull test artifacts (from repo root)
            cd ../.. && mkdir -p artifacts/test-images
            adb pull /sdcard/Download/test-images/test-1080p.jpg artifacts/test-images/ || true
            adb pull /sdcard/Download/test-images/test-2k.jpg artifacts/test-images/ || true
            adb pull /sdcard/Download/test-images/test-4k.jpg artifacts/test-images/ || true
            adb pull /sdcard/Download/test-images/test-1080p.webp artifacts/test-images/ || true
            adb pull /sdcard/Download/test-images/test-2k.webp artifacts/test-images/ || true
            adb pull /sdcard/Download/test-images/test-4k.webp artifacts/test-images/ || true

      - name: Upload Test Images Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-images-${{ github.sha }}
          path: artifacts/test-images/*
          retention-days: 30
          if-no-files-found: warn
          compression-level: 6

      - name: Upload Maestro Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-reports-android-${{ github.sha }}
          path: |
            .maestro/**/*.png
            maestro-report.html
          retention-days: 7
          if-no-files-found: ignore
          compression-level: 6

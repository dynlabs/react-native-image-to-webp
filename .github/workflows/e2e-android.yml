name: E2E Tests Android

on:
  push:
    branches: [main, develop]
    paths:
      - 'example/**'
      - 'src/**'
      - '.maestro/**'
      - '.github/workflows/e2e-android.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'example/**'
      - 'src/**'
      - '.maestro/**'
      - '.github/workflows/e2e-android.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-android:
    name: E2E Tests Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      # Enable KVM for hardware acceleration (required for x86_64 emulators on Linux)
      # This must be done BEFORE the emulator runner action
      - name: Enable KVM group perms
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Parallel setup steps that don't depend on each other
      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup

      - name: Setup JDK
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
          cache-dependency-path: example/android/gradle/wrapper/gradle-wrapper.properties

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: pip install Pillow

      - name: Cache Maestro
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.maestro
          key: ${{ runner.os }}-maestro-latest
          restore-keys: |
            ${{ runner.os }}-maestro-

      - name: Setup Maestro
        run: |
          if [ ! -f "$HOME/.maestro/bin/maestro" ]; then
            curl -Ls "https://get.maestro.mobile.dev" | bash
          fi
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # Generate test images before emulator starts (parallel with other setup)
      - name: Generate Test Images
        run: python scripts/generate-test-images.py

      # Make gradlew executable before emulator starts
      - name: Prepare Gradle Wrapper
        run: chmod +x example/android/gradlew

      # Debug: Check system info before emulator starts
      - name: Debug System Information
        run: |
          echo "=========================================="
          echo "🔍 DEBUG: System Information"
          echo "=========================================="
          echo "OS: $(uname -a)"
          echo "CPU: $(lscpu | grep 'Model name' || echo 'Unknown')"
          echo "Memory: $(free -h | grep Mem || echo 'Unknown')"
          echo "Available disk space:"
          df -h
          echo "KVM availability:"
          ls -la /dev/kvm || echo "KVM not available"
          echo "Current user: $(whoami)"
          echo "Groups: $(groups)"
          echo "Android SDK location: $ANDROID_HOME"
          echo "Java version:"
          java -version
          echo "ADB version:"
          $ANDROID_HOME/platform-tools/adb version || echo "ADB not found"
          echo "Emulator location:"
          ls -la $ANDROID_HOME/emulator/emulator || echo "Emulator not found"
          echo "=========================================="

      # Start emulator and run all emulator-dependent steps in one block
      - name: Create Android Emulator and Run Tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ANDROID_EMULATOR_VERBOSE: 1
          ANDROID_LOG_TAGS: "*:V"
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 30
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          profile: Nexus 6
          emulator-boot-timeout: 300
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot-load -noaudio -no-boot-anim -skip-adb-auth -wipe-data -no-metrics
          disable-animations: true
          disable-linux-hw-accel: false
          script: |
            # Enable verbose logging
            export ANDROID_EMULATOR_VERBOSE=1
            export ANDROID_LOG_TAGS="*:V"
            
            echo "=========================================="
            echo "🔍 DEBUG: Starting emulator verification"
            echo "=========================================="
            
            # Check ADB status
            echo "📱 Checking ADB status..."
            adb version
            adb start-server
            echo "ADB devices before wait:"
            adb devices -l
            
            # The android-emulator-runner action automatically starts the emulator
            # and waits for it to boot before running this script.
            # Verify emulator is accessible
            echo "📱 ADB devices:"
            adb devices -l
            
            # Check emulator boot status
            echo "🔍 Checking emulator boot status..."
            for i in {1..30}; do
              BOOT_COMPLETED=$(adb shell getprop sys.boot_completed 2>/dev/null || echo "")
              BOOT_ANIM=$(adb shell getprop init.svc.bootanim 2>/dev/null || echo "")
              echo "  Attempt $i/30: boot_completed=$BOOT_COMPLETED, bootanim=$BOOT_ANIM"
              if [ "$BOOT_COMPLETED" = "1" ] && [ "$BOOT_ANIM" = "stopped" ]; then
                echo "✅ Emulator fully booted!"
                break
              fi
              sleep 2
            done
            
            # Final verification
            echo "🔍 Final emulator verification..."
            adb shell getprop ro.build.version.release || echo "⚠️ Could not get Android version"
            adb shell getprop ro.product.model || echo "⚠️ Could not get device model"
            
            # Capture logcat for debugging (last 50 lines)
            echo "📋 Capturing recent logcat output..."
            timeout 5 adb logcat -d -t 50 || echo "⚠️ Could not capture logcat"
            
            # Check emulator process
            echo "🔍 Checking emulator process..."
            ps aux | grep -i emulator | grep -v grep || echo "⚠️ No emulator process found"
            
            echo "✅ Emulator ready, starting build and test process..."
            
            # Build Release APK with optimized Gradle settings
            cd example/android
            ./gradlew assembleRelease \
              --no-daemon \
              --console=plain \
              --build-cache \
              --parallel \
              --max-workers=4 \
              -PreactNativeArchitectures=x86_64 || exit 1
            
            echo "✅ Release APK built successfully"
            
            # Install APK and grant permissions
            adb wait-for-device
            echo "📱 Installing Release APK..."
            adb install -r app/build/outputs/apk/release/app-release.apk || exit 1
            
            echo "🔐 Granting permissions..."
            adb shell pm grant dynlabs.reactnativeimagetowebp.example android.permission.READ_EXTERNAL_STORAGE || true
            adb shell pm grant dynlabs.reactnativeimagetowebp.example android.permission.READ_MEDIA_IMAGES || true
            adb shell pm grant dynlabs.reactnativeimagetowebp.example android.permission.CAMERA || true
            
            # Push test images
            echo "📸 Pushing test images..."
            adb shell mkdir -p /sdcard/Download/test-images
            adb push ../../test-images/test-1080p.jpg /sdcard/Download/test-images/test-1080p.jpg || exit 1
            adb push ../../test-images/test-2k.jpg /sdcard/Download/test-images/test-2k.jpg || exit 1
            adb push ../../test-images/test-4k.jpg /sdcard/Download/test-images/test-4k.jpg || exit 1
            adb shell ls -lh /sdcard/Download/test-images/
            
            # Run Maestro tests
            echo "🧪 Running Maestro tests..."
            cd ../..
            maestro test .maestro/flows/android/ || maestro test .maestro/flows/android/ --continue-on-failure || exit 1
            
            # Pull test artifacts
            echo "📦 Collecting test artifacts..."
            mkdir -p artifacts/test-images
            adb pull /sdcard/Download/test-images/test-1080p.jpg artifacts/test-images/ || echo "⚠️ Failed to pull test-1080p.jpg"
            adb pull /sdcard/Download/test-images/test-2k.jpg artifacts/test-images/ || echo "⚠️ Failed to pull test-2k.jpg"
            adb pull /sdcard/Download/test-images/test-4k.jpg artifacts/test-images/ || echo "⚠️ Failed to pull test-4k.jpg"
            adb pull /sdcard/Download/test-images/test-1080p.webp artifacts/test-images/ || echo "⚠️ Failed to pull test-1080p.webp (may not exist)"
            adb pull /sdcard/Download/test-images/test-2k.webp artifacts/test-images/ || echo "⚠️ Failed to pull test-2k.webp (may not exist)"
            adb pull /sdcard/Download/test-images/test-4k.webp artifacts/test-images/ || echo "⚠️ Failed to pull test-4k.webp (may not exist)"
            
            echo "✅ All tests completed!"

      - name: Upload Test Images Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-images-${{ github.sha }}
          path: artifacts/test-images/*
          retention-days: 30
          if-no-files-found: warn
          compression-level: 6

      - name: Upload Maestro Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-reports-android-${{ github.sha }}
          path: |
            .maestro/**/*.png
            maestro-report.html
          retention-days: 7
          if-no-files-found: ignore
          compression-level: 6

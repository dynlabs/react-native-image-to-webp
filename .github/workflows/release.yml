name: Release

on:
  workflow_dispatch:
    inputs:
      otp:
        description: 'NPM OTP code (required if 2FA enabled)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Restore Yarn cache
        id: yarn-cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            **/node_modules
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/package.json', '!node_modules/**') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: yarn install
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false

      - name: Save Yarn cache
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            **/node_modules
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/package.json', '!node_modules/**') }}

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Verify version not already published
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "@dynlabs/react-native-image-to-webp@$VERSION" version > /dev/null 2>&1; then
            echo "Error: Version $VERSION is already published on npm"
            exit 1
          fi
          echo "Version $VERSION is not published, proceeding..."

      - name: Build package
        run: yarn build

      - name: Extract changelog for version
        id: changelog_content
        run: |
          CHANGELOG_TEXT=$(python3 << 'EOF'
          import re
          version = "${{ steps.version.outputs.version }}"
          try:
              with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
                  content = f.read()
              # Find the section for this version (from ## [version] to next ## [version] or end)
              pattern = rf'## \[{re.escape(version)}\](.*?)(?=## \[|\Z)'
              match = re.search(pattern, content, re.DOTALL)
              if match:
                  notes = match.group(1).strip()
                  # Clean up: remove empty lines and trim
                  notes = '\n'.join(line for line in notes.split('\n') if line.strip())
                  print(notes)
              else:
                  print(f"Version {version} release.")
          except Exception as e:
              print(f"Version {version} release.\n\n(Error extracting changelog: {e})")
          EOF
          )
          
          {
            echo 'release_notes<<RELEASE_NOTES_EOF'
            echo "$CHANGELOG_TEXT"
            echo 'RELEASE_NOTES_EOF'
          } >> $GITHUB_OUTPUT

      - name: Create git tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Publish to npm
        run: |
          if [ -n "${{ inputs.otp }}" ]; then
            npm publish --access public --otp=${{ inputs.otp }}
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ${{ steps.changelog_content.outputs.release_notes }}
            
            ---
            
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v${{ steps.version.outputs.version }}^...v${{ steps.version.outputs.version }}
            
            **Install**: `npm install @dynlabs/react-native-image-to-webp@${{ steps.version.outputs.version }}`
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
